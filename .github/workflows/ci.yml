# Spektrafilm for Android — Continuous Integration
#
# Six jobs run on every push / PR / manual dispatch:
#   • engine-native   — compiles C++ engine + JNI bridge into libspektra.so (host toolchain)
#   • engine-parity   — deterministic stage parity tests against committed goldens (bit-exact
#                        gate: scan_portra, print_portra, print_ektar + spatial/crop/autoexp/
#                        diffusion; runs on push/PR)
#   • parity          — standalone .spkvec comparator (CMake + ctest self-test)
#   • python-lint     — byte-compiles the Python parity harness
#   • android         — JVM unit tests (:app:testDebugUnitTest) + :app:lint (abortOnError gate
#                        for NewApi/correctness) + Gradle assemble of the full app + modules
#                        (NDK-built .so for all ABIs)
#   • android-emulator— installs APK on KVM AVD, smoke-tests MainActivity; manual
#                        workflow_dispatch only — fails during setup on hosted runners
#
# Film modeling powered by spektrafilm (GPLv3).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Native engine: the ported C++ (model/ + kernels/) plus the JNI bridge must
  # compile and link into a shared library on a host toolchain. This is the
  # build gate for engine:spektra-core ahead of the NDK build.
  # ---------------------------------------------------------------------------
  engine-native:
    name: Engine (C++ host build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK (for jni.h)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compile libspektra.so (engine + JNI bridge)
        working-directory: engine/spektra-core/src/main/cpp
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          shopt -s nullglob
          g++ -std=c++17 -O2 -Wall -Wextra -fPIC -shared -pthread \
            -I. -I"$JAVA_HOME/include" -I"$JAVA_HOME/include/linux" \
            spektra.cpp spektra_jni.cpp \
            kernels/*.cpp io/*.cpp model/*.cpp profiles/*.cpp \
            runtime/*.cpp runtime/stages/*.cpp \
            -o libspektra.so
          ls -l libspektra.so
          # Sanity: the engine's exported C symbols are present.
          nm -D libspektra.so | grep -E "spk_simulate|spk_engine_create" || \
            (echo "missing expected engine symbols" && exit 1)

  # ---------------------------------------------------------------------------
  # Engine parity: compile the deterministic stage tests and run them against the
  # BUNDLED assets (profiles + spectral LUT) and the committed goldens. This is a
  # real bit-exact gate on the ported pipeline (scan_film + print + spatial),
  # independent of any Python/oracle. Grain tests are statistical and run locally.
  # ---------------------------------------------------------------------------
  engine-parity:
    name: Engine parity (deterministic goldens)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + run stage parity tests
        run: |
          set -euo pipefail
          shopt -s nullglob
          CPP="$GITHUB_WORKSPACE/engine/spektra-core/src/main/cpp"
          ASSET="$GITHUB_WORKSPACE/engine/spektra-core/src/main/assets/spektra"
          G="$GITHUB_WORKSPACE/tools/parity/goldens"
          LUT="$ASSET/luts/spectral_upsampling/irradiance_xy_tc.npy"
          cd "$CPP"
          SRC="spektra.cpp kernels/*.cpp io/*.cpp model/*.cpp profiles/*.cpp runtime/*.cpp runtime/stages/*.cpp"
          DEF=-DSPK_TEST_DIR="\"$CPP/tests\""
          fail=0
          build_run() { # name, binary-args...
            local name="$1"; shift
            g++ -std=c++17 -O2 -pthread -I. -I"$GITHUB_WORKSPACE/tools/parity" $DEF \
              "tests/$name.cpp" $SRC -o "/tmp/$name"
            echo "::group::$name"
            # Capture the TEST's exit code (PIPESTATUS[0], not tee's). The `if`
            # condition exempts the pipeline from `set -e` so a non-zero exit is
            # observed rather than aborting. A test signals a setup failure with a
            # non-zero return (e.g. missing asset/golden, size mismatch) and a
            # crash/segfault aborts before any "FAIL" print — neither necessarily
            # contains the string "FAIL", so the exit code and an empty-output
            # check must gate alongside the grep, or the parity gate false-greens.
            local rc=0
            if "/tmp/$name" "$@" 2>&1 | tee "/tmp/$name.out"; then rc=0; else rc=${PIPESTATUS[0]}; fi
            if [ "$rc" -ne 0 ]; then
              echo "$name: FAIL (exit $rc)"; fail=1
            elif [ ! -s "/tmp/$name.out" ]; then
              echo "$name: FAIL (no output)"; fail=1
            elif grep -qiE "FAIL" "/tmp/$name.out"; then
              echo "$name: FAIL"; fail=1
            else
              echo "$name: ok"
            fi
            echo "::endgroup::"
          }
          # Pass $G as argv[4] (goldens root) so the test also asserts print_portra and
          # print_ektar from the committed goldens (not from a hardcoded /home/user path).
          build_run test_simulate_e2e "$ASSET" "$G/scan_portra" tests/scan_portra_input_rgb.f64 "$G"
          build_run test_filming "$ASSET/profiles/kodak_portra_400.json" "$G/scan_portra" "$LUT" tests/scan_portra_input_rgb.f64
          build_run test_spatial "$ASSET/profiles/kodak_portra_400.json" "$G/scan_portra_spatial" "$LUT" tests/scan_portra_input_rgb.f64
          build_run test_crop_resize "$ASSET" "$G/scan_portra_crop" tests/scan_portra_input_rgb.f64
          # Downscale (upscale_factor < 1, MINIFICATION) anti-aliasing prefilter:
          # skimage.transform.rescale defaults anti_aliasing=True for a shrinking
          # output dimension (order>0), running scipy.ndimage.gaussian_filter
          # (sigma = max(0,(in/out-1)/2) per spatial axis, mode='mirror') BEFORE the
          # order=3 cubic zoom. Without it the full pipeline diverges ~1.8e-1 from
          # the oracle; crop_resize.cpp now ports that prefilter (no-op for
          # factor>=1, so the upscale goldens stay byte-identical). Golden
          # (scan_portra_downscale, 64->32) pinned to oracle c1d0e44.
          build_run test_downscale "$ASSET" "$G/scan_portra_downscale" tests/scan_portra_input_rgb.f64
          build_run test_autoexposure "$ASSET" "$G/scan_portra_autoexp" tests/scan_portra_input_rgb.f64 "$G"
          # small_preview (auto-exposure metering downscale) anti-aliasing prefilter:
          # the >256px import path the 64px autoexposure golden cannot reach.
          # skimage.transform.rescale(order=0) defaults anti_aliasing=True on a float
          # downscale and gaussian-blurs (sigma=max(0,(in/out-1)/2), mode='mirror')
          # BEFORE the nearest resample; without it the metered EV (a global gain on
          # every pixel) diverges from the oracle. Stage-local skimage golden.
          build_run test_small_preview_aa "$ASSET" "$G/small_preview_aa" tests/small_preview_aa_input_rgb.f64 "$G"
          build_run test_diffusion "$G"
          build_run test_diffusion_e2e "$ASSET" "$G/scan_diffusion" tests/scan_portra_input_rgb.f64 "$G"
          # Spectral-domain Gaussian blur of the reconstructed-spectra LUT
          # (settings.spectral_gaussian_blur=5): blurs HANATOS2025_SPECTRA_LUT along
          # its spectral axis inside compute_hanatos2025_tc_lut (scipy.ndimage.
          # gaussian_filter sigma=(0,0,5), mode='reflect', truncate=4), changing the
          # filming tc_lut and every downstream tap. Golden pinned to oracle c1d0e44.
          build_run test_spectral_blur_e2e "$ASSET" "$G/scan_spectral_blur" tests/scan_portra_input_rgb.f64 "$G"
          # Hanatos2025 sensitivity-adaptation window/surface toggles
          # (settings.apply_hanatos2025_adaptation_window / _surface). The SURFACE
          # branch multiplies the filming tc_lut per-cell by 2**surface, where
          # surface = eval_poly4_log_exposure_surface(profile.surface_params,
          # illuminant_xy=_illuminant_to_xy(film.reference_illuminant), model='poly4')
          # inside compute_hanatos2025_tc_lut, changing the filming tc_lut and every
          # downstream tap. Also checks the WINDOW-OFF case. Goldens pinned to oracle
          # c1d0e44.
          build_run test_hanatos_surface_e2e "$ASSET" "$G/scan_portra_surface" tests/scan_portra_input_rgb.f64 "$G"
          # Camera UV/IR cut band-pass filter (camera.filter_uv / filter_ir): the
          # band-pass = filter_uv*filter_ir (each 1-amp + amp*sigmoid_erf) multiplies
          # the profile sensitivity with a per-channel white-balance normalisation
          # against the film reference illuminant, BEFORE the spectra contraction in
          # compute_hanatos2025_tc_lut (FilmingStage._rgb_to_film_raw), changing the
          # filming tc_lut and every downstream tap. Golden pinned to oracle c1d0e44.
          build_run test_camera_uvir_e2e "$ASSET" "$G/scan_portra_uvir" tests/scan_portra_input_rgb.f64 "$G"
          # Enlarger PREFLASH (enlarger.preflash_exposure / preflash_y_filter_shift /
          # preflash_m_filter_shift): a uniform pre-exposure flash of the print paper
          # before the image exposure. printing.py::_compute_raw_preflash adds a constant
          # per-print-channel raw_preflash 3-vector (= sum_l 10^-base_density[l] *
          # preflash_illuminant[l] * sens[l,k]) * preflash_exposure to the print raw,
          # AFTER the midgray factor and BEFORE the log10 inside
          # _film_cmy_to_print_log_raw. The preflash illuminant is color_enlarger(enlarger
          # source, CC=[c_neutral, m_neutral+preflash_m, y_neutral+preflash_y]) — its OWN
          # filter shifts (filter_enlarger_source.preflash_filtered_illuminant). It is a
          # PRINT-stage effect (scan_film=False), changing print_density_cmy + final_rgb
          # but NOT the film taps. Golden pinned to oracle c1d0e44.
          build_run test_preflash_e2e "$ASSET" "$G/print_portra_preflash" tests/scan_portra_input_rgb.f64 "$G"
          # PRINT-route EXPOSURE-COMPENSATION midgray balance
          # (camera.exposure_compensation_ev + enlarger.print_exposure_compensation /
          # normalize_print_exposure). PrintingStage._compute_exposure_factor_midgray
          # (printing.py c1d0e44 L104-118) selects the midgray factor by a 4-case
          # branch over (print_exposure_compensation, normalize_print_exposure) using
          # the UNcompensated midgray (rgb=0.184) and the COMPENSATED midgray
          # (rgb=0.184*2^exposure_compensation_ev) from
          # FilmingStage._compute_density_spectral_midgray_to_balance_print (filming.py
          # c1d0e44 L125-134). The native engine previously hardcoded ev==0 and always
          # returned the UNcompensated factor, mis-balancing the print whenever EV!=0.
          # Two goldens (both EV=1.5): print_portra_evcomp (comp+normalize ON ->
          # factor_midgray_comp) and print_portra_evcomp_nonorm (comp ON, normalize OFF
          # -> factor_midgray_comp/factor_midgray) pin both EV-active branches. At EV=0
          # the compensated gray equals the uncompensated gray, so every existing print
          # golden stays byte-identical. Goldens pinned to oracle c1d0e44. The test also
          # asserts EV on-vs-off and the norm/no-norm branch both produce a real delta.
          build_run test_print_evcomp_e2e "$ASSET" "$G/print_portra_evcomp" tests/scan_portra_input_rgb.f64 "$G"
          # OPT-IN s023 print density-curve morph (model/morph_curves.cpp): rebuilds
          # the print density table from the paper's density_curves_model under a
          # coupled-gamma + developer-exhaustion morph. Default-OFF (the engine
          # interpolates the stored table, byte-identical to the print goldens); this
          # gates the active path against an upstream morph_curves.py golden.
          build_run test_print_curves_morph "$ASSET" "$G/print_curves_morph" "$G"
          # Scanner BLACK/WHITE corrections (scanner.black/white_correction +
          # black/white_level) -> runtime/services/color_reference.py
          # (ColorReferenceService): a scan-time tone anchor that maps the measured
          # CIE Y at the reference black/white densities to the (sRGB-decoded) target
          # levels via clip(m*Y+q,0,1), back-applied as an exposure correction to the
          # print (or filming) raw AND as a per-pixel XYZ rescale in scanning. Two
          # routes: CASE A print (portra->endura, negative paper) fires the printing
          # exposure + scanning XYZ corrections (film taps UNCHANGED); CASE B scan_film
          # on a POSITIVE film (provia, DIR couplers off to isolate the un-gated
          # positive coupler branch) fires the filming exposure + scanning XYZ
          # corrections. Goldens pinned to oracle c1d0e44.
          build_run test_scanner_bwcorr_e2e "$ASSET" "$G/print_portra_bwcorr" tests/scan_portra_input_rgb.f64 "$G"
          # POSITIVE-film DIR-coupler develop path: scan_film route on a POSITIVE film
          # (fujifilm_provia_100f) with the DIR couplers ON. Every other golden is
          # negative film, so this is the only gate on the positive branch of
          # model/couplers.py (density_silver = nanmax(density_curves) - density,
          # interpolate the -density curve) AND on the provia stock-specific
          # DIR-coupler gamma override in params_builder._apply_film_specifics
          # (gamma_samelayer_rgb=(0.156,0.104,0.078)) applied after the generic
          # positive default — without it the inhibitor matrix is wrong and
          # film_density_cmy diverges ~0.32. Golden pinned to oracle c1d0e44.
          build_run test_provia_couplers_e2e "$ASSET" "$G/scan_provia_couplers" tests/scan_portra_input_rgb.f64
          # numpy.interp port for the DIR-coupler non-monotonic axis le0 = le - silver@M:
          # model/couplers.cpp::np_interp_array reproduces numpy's order-dependent
          # binary_search_with_guess (a plain ascending binary search picks a different
          # bracket on a non-monotonic xp). Checked bit-exact vs np.interp over 82 cases.
          build_run test_np_interp tests/np_interp_cases.bin
          build_run test_lut_accel "$G"
          build_run test_scanner_lut_e2e "$ASSET" "$G/scan_portra" tests/scan_portra_input_rgb.f64
          build_run test_enlarger_lut_e2e "$ASSET" "$G/print_portra" tests/scan_portra_input_rgb.f64
          # Output color spaces: scan_portra final_rgb for all six output spaces
          # (sRGB / Adobe RGB / ProPhoto / Rec.2020 / ACES2065-1 / linear sRGB) vs the
          # committed per-space refs in tests/ (argv[3] = ref dir on the runner).
          build_run test_output_spaces "$ASSET/profiles/kodak_portra_400.json" "$G/scan_portra" "$CPP/tests"
          # Camera/scanner lens-blur spatial parity (film_density_cmy + final_rgb).
          build_run test_lensblur "$ASSET/profiles/kodak_portra_400.json" "$G/scan_portra_lensblur" "$LUT" tests/scan_portra_input_rgb.f64
          # Thread-count invariance: per-pixel stages are parallelized (kernels/parallel);
          # the output must be byte-identical at 1 vs 8 workers (scan, print, and the
          # grain+halation branch). Guards the bit-exact parity gate under threading.
          build_run test_parallel "$ASSET" tests/scan_portra_input_rgb.f64
          # Optional tone curve on the final display RGB: the default (inactive) and an
          # identity active curve must reproduce the scan_portra golden bit-for-bit
          # (new look control must not perturb existing goldens); a real S-curve must
          # change the output and stay in [0,1].
          build_run test_tonecurve "$ASSET/profiles/kodak_portra_400.json" "$G/scan_portra"
          # fp16 (half-float) conversion: scalar IEEE-754 round-trip + bulk path agree
          # (NEON vcvt on arm, scalar on the host runner). No assets needed.
          build_run test_half
          # Bake a 17^3 .cube 3D LUT for the default scan_film look from the
          # BUNDLED assets (argv[1] = asset dir): validates the .cube header,
          # the N^3 data-line count, value sanity, non-degeneracy (not identity/
          # constant), and that two bakes are byte-identical (the stochastic
          # toggles are forced off internally so the bake is deterministic).
          build_run test_bake_lut "$ASSET"
          # spk_params pass-through (live/dead probe, not a bit-exact gate):
          # perturbing each newly-wired field one at a time MUST measurably change
          # the output. Self-contained — runs against the BUNDLED assets (argv[1])
          # and the committed input vector (argv[2]); loads no oracle golden.
          build_run test_params_passthrough "$ASSET" tests/scan_portra_input_rgb.f64
          # Highlight boost (film_render.halation.boost_ev / boost_range / protect_ev):
          # the pre-clip highlight reconstruction (utils/numba_boost_hightlights.
          # boost_highlights) that FilmingStage.expose applies to the float64 raw
          # irradiance right after the exposure-comp scale and BEFORE the diffusion
          # filter / lens blur / halation (filming.py:58-60), midgray=0.184. It lifts
          # every raw value above raw_x0=clip(0.184*2^protect_ev,0,max(raw)) by
          # k*max_raw*(exp(a*dx)-a*dx-1), a=28^(1-boost_range),
          # k=(2^boost_ev-1)/(exp(a(1-x0))-a(1-x0)-1). Pointwise + NOT gated by
          # deactivate_spatial_effects, so it changes the film taps + final_rgb with
          # spatial/grain off. Golden (scan_portra_boost) pinned to oracle c1d0e44.
          build_run test_highlight_boost_e2e "$ASSET" "$G/scan_portra_boost" tests/scan_portra_input_rgb.f64 "$G"
          exit $fail

  # ---------------------------------------------------------------------------
  # Parity harness: the standalone .spkvec comparator builds and its byte-format
  # self-test passes. This is the gate that engine ports (M3/M4) run against.
  # ---------------------------------------------------------------------------
  parity:
    name: Parity comparator (CMake + ctest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure + build
        working-directory: tools/parity
        run: |
          set -euo pipefail
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run self-test
        working-directory: tools/parity
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Python harness: the golden generator + spkvec I/O must at least byte-compile.
  # (Generating real goldens needs a spektrafilm env; that runs out-of-CI for now
  # — see tools/parity/README.md.)
  # ---------------------------------------------------------------------------
  python-lint:
    name: Python harness (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Byte-compile parity scripts
        run: python -m py_compile tools/parity/gen_goldens.py tools/parity/spkvec.py

  # ---------------------------------------------------------------------------
  # Android build: assemble the debug APK (app + engine:spektra-core, with the
  # NDK-built libspektra.so for all ABIs). Installs the SDK + NDK + CMake on the
  # runner, then builds with the committed Gradle wrapper, and uploads the APK.
  # ---------------------------------------------------------------------------
  android:
    name: Android (assemble debug APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake + build-tools
        # NDK r27 gives 16 KB-aligned native LOAD segments (Android 15 16 KB pages);
        # build-tools 35 provides the zipalign `-P 16` that page-aligns the bundled
        # .so to 16 KB offsets in the APK.
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" "build-tools;35.0.0"

      - name: Run JVM unit tests
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (:app:lint)
        # Android lint with abortOnError=true (baseline at app/lint-baseline.xml):
        # fails the job on any lint error. This gates correctness/NewApi issues such
        # as the unguarded API-28 getLongVersionCode call that previously slipped
        # through because lint ran only locally, never in PR CI. No flags are passed
        # that would downgrade errors to warnings.
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:lint --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-lint-report
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: warn

      - name: Assemble debug APK
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Verify 16 KB page compatibility (Android 15)
        # Guards against a regression of the 16 KB-page fix. Two requirements:
        #   1. Every bundled .so sits at a 16 KB-aligned offset in the APK zip
        #      (zipalign -P 16), so a 16 KB-page device can mmap it directly.
        #   2. Every 64-bit (arm64-v8a / x86_64) .so has 16 KB-aligned PT_LOAD
        #      segments. 32-bit ABIs always run on 4 KB pages, so they are exempt.
        run: |
          set -euo pipefail
          APK=app/build/outputs/apk/debug/app-debug.apk
          BT="$ANDROID_HOME/build-tools/35.0.0"
          # zipalign -c exits 0 when every entry is aligned, non-zero otherwise.
          # (Don't grep its stdout — the tool prints "succesful", misspelled.)
          "$BT/zipalign" -c -v -P 16 4 "$APK"
          rm -rf /tmp/apk16 && mkdir -p /tmp/apk16
          unzip -oq "$APK" 'lib/arm64-v8a/*' 'lib/x86_64/*' -d /tmp/apk16
          bad=0
          for so in $(find /tmp/apk16/lib -name '*.so'); do
            a=$(readelf -lW "$so" | awk '/LOAD/{print $NF; exit}')
            if [ "$a" != "0x4000" ]; then echo "NOT 16KB-aligned: ${so#/tmp/apk16/} ($a)"; bad=1; fi
          done
          [ "$bad" = 0 ] && echo "All 64-bit native libs are 16 KB-aligned."
          exit $bad

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spektrafilm-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Android emulator smoke test: installs the debug APK produced by the
  # `android` job onto a KVM-accelerated AVD (API 34, x86_64) and verifies that
  # MainActivity launches without a fatal crash.
  #
  # Why artifact-reuse instead of a second full build?
  #   • Avoids duplicating the ~10-minute NDK/CMake/Gradle build on the same
  #     runner tier.
  #   • Makes the dependency explicit: the emulator job only runs when the build
  #     job produced a good APK, which is the right semantics.
  #   • Keeps the emulator job focused on on-device verification, not building.
  #
  # KVM note: `ubuntu-latest` GitHub-hosted runners expose /dev/kvm; the cloud
  # dev sandbox (this container) does not — so this job is GitHub-only.
  # ---------------------------------------------------------------------------
  android-emulator:
    name: Android emulator smoke test (API 34 / x86_64)
    runs-on: ubuntu-latest
    needs: android
    # MANUAL-TRIGGER ONLY for now: this job has been failing during *setup*
    # (before the emulator boots) on the hosted runners and needs a human to
    # read the run log to pinpoint it (likely KVM/runner-image specific). Until
    # then it is gated to workflow_dispatch so it doesn't fail on every push.
    # To run it: Actions tab -> CI -> "Run workflow". Re-enable on push/PR by
    # removing this `if:` once it has gone green and the cause is understood.
    # continue-on-error keeps it advisory even when dispatched.
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # adb / avdmanager / sdkmanager. The emulator binary and the
      # system image are installed by reactivecircus/android-emulator-runner
      # below (keyed off api-level/target/arch), so we do NOT pre-install the
      # NDK/CMake/system-image here — this job only runs the prebuilt APK, and
      # the large NDK download was an unnecessary failure/disk surface.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Grant the runner's user access to /dev/kvm (standard udev rule from the
      # reactivecircus/android-emulator-runner action README).
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Download the APK produced by the `android` job — no rebuild needed.
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Spektrafilm-debug-apk
          path: apk/

      # Cache the AVD snapshot so subsequent runs don't re-create it from scratch.
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-v1

      # Pre-create the AVD when the cache is cold.  The emulator-runner action
      # can also do this, but doing it in a separate step keeps the log cleaner.
      - name: Create AVD (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          disable-animations: false
          script: echo "AVD created."

      # Main smoke-test: boot the cached AVD, install the APK, launch
      # MainActivity, and assert no fatal crash.
      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          disable-animations: true
          script: |
            set -euo pipefail

            APK=$(ls apk/*.apk | head -1)
            echo "Installing APK: $APK"
            adb install -r "$APK"

            echo "--- Launching MainActivity ---"
            # -W waits until onResume; captures ShortMsg/LongMsg on crash.
            adb shell am start -W \
              -n "com.spectrafilm.app/.MainActivity" \
              -a android.intent.action.MAIN \
              -c android.intent.category.LAUNCHER

            echo "--- Waiting 8 s for the app to fully initialise ---"
            sleep 8

            echo "--- Capturing screenshot ---"
            mkdir -p emulator-artifacts
            adb exec-out screencap -p > emulator-artifacts/screenshot.png || true

            echo "--- Dumping logcat ---"
            adb logcat -d > emulator-artifacts/logcat.txt || true

            echo "--- Asserting no FATAL EXCEPTION in com.spectrafilm.app ---"
            # Android prints "FATAL EXCEPTION: main" and "Process: com.spectrafilm.app"
            # on separate lines, so scan the lines *following* each fatal marker for
            # our package. UnsatisfiedLinkError lines name our .so directly.
            if grep -A4 -E "FATAL EXCEPTION" emulator-artifacts/logcat.txt \
                 | grep -q "com.spectrafilm.app" \
               || grep -E "UnsatisfiedLinkError" emulator-artifacts/logcat.txt \
                 | grep -q -E "libspektra|libsfraw|libsftiff|com.spectrafilm.app"; then
              echo "SMOKE TEST FAILED: fatal crash or UnsatisfiedLinkError detected in com.spectrafilm.app"
              grep -A6 -E "FATAL EXCEPTION|UnsatisfiedLinkError" emulator-artifacts/logcat.txt || true
              exit 1
            fi

            echo "--- Asserting MainActivity is the resumed/focused activity ---"
            ACTIVITIES=$(adb shell dumpsys activity activities 2>/dev/null || true)
            if echo "$ACTIVITIES" | grep -q "com.spectrafilm.app/.MainActivity"; then
              echo "SMOKE TEST PASSED: MainActivity is present in the activity stack."
            else
              echo "SMOKE TEST FAILED: com.spectrafilm.app/.MainActivity not found in activity stack."
              echo "$ACTIVITIES" | grep -E "mResumedActivity|mFocusedActivity|TopResumedActivity" || true
              exit 1
            fi

            echo "--- Smoke test complete ---"

      # Always upload screenshot + logcat so failures are debuggable.
      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-smoke-artifacts
          path: emulator-artifacts/
          if-no-files-found: warn
